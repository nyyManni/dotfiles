add_newline = false


format = """
[](#3B4252)\
${custom.macos}\
${custom.windows}\
${custom.linux}\
$username\
[¯é░](bg:#434C5E fg:#3B4252)\
$directory\
[¯é░](fg:#434C5E bg:#4C566A)\
$git_branch\
$git_status\
[¯é░](fg:#4C566A bg:#86BBD8)\
$c\
$elixir\
$elm\
$golang\
$haskell\
$python\
$java\
$julia\
$nodejs\
$nim\
$rust\
[¯é░](fg:#86BBD8 bg:#06969A)\
$docker_context\
[¯é░](fg:#06969A bg:#33658A)\
$time\
[¯é░ ](fg:#33658A bg:#3B4252)\
$aws\
[¯é░ ](fg:#3B4252)\
"""
command_timeout = 5000


# You can also replace your username with a neat symbol like ´äá to save some space
[username]
show_always = true
style_user = "bg:#3B4252"
style_root = "bg:#3B4252"
format = '[$user ]($style)'

[directory]
style = "bg:#434C5E"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "´£ÿ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ´£ÿ´ä¬ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important ´£ÿ " = " ´£ÿ´ä¬ "

[c]
symbol = "¯ÿ× "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = "´îê "
style = "bg:#06969A"
format = '[ $symbol $context ]($style) $path'

[python]
symbol = "¯£╝"
