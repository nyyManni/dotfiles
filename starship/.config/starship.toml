[custom.macos]
when = true
os = "macos"
format = "[ $symbol  ]($style)"
style = "bg:#3B4252"
symbol = "¯£æ"

[custom.linux]
when = true
os = "linux"
format = "[ $symbol  ]($style)"
style = "bg:#3B4252"
symbol = "¯¢å"

[custom.windows]
when = true
os = "windows"
format = "[ $symbol  ]($style)"
style = "bg:#3B4252"
